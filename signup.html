<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Sign up for TaskFlow — your personal todo app">
  <title>Sign Up — TaskFlow</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="background-shapes" aria-hidden="true">
    <div class="shape shape-1"></div>
    <div class="shape shape-2"></div>
    <div class="shape shape-3"></div>
  </div>

  <main class="app auth-page">
    <header class="app-header">
      <div class="logo">
        <span class="logo-icon" aria-hidden="true">✦</span>
        <h1>TaskFlow</h1>
      </div>
      <p class="tagline">Create your free account</p>
    </header>

    <section class="auth-card">
      <h2 class="auth-title">Get started</h2>
      <p class="auth-subtitle">Sign up to start organizing your tasks</p>

      <form class="auth-form" id="signup-form" novalidate>
        <div class="form-group">
          <label for="name">Full name</label>
          <input
            type="text"
            id="name"
            class="auth-input"
            placeholder="John Doe"
            autocomplete="name"
            required
          >
        </div>

        <div class="form-group">
          <label for="email">Email</label>
          <input
            type="email"
            id="email"
            class="auth-input"
            placeholder="you@example.com"
            autocomplete="email"
            required
          >
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <div class="password-wrapper">
            <input
              type="password"
              id="password"
              class="auth-input"
              placeholder="At least 6 characters"
              autocomplete="new-password"
              required
            >
            <button type="button" class="toggle-password" id="toggle-password" aria-label="Show password">
              <svg class="icon-show" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                <circle cx="12" cy="12" r="3"></circle>
              </svg>
              <svg class="icon-hide" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true" hidden>
                <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"></path>
                <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"></path>
                <line x1="1" y1="1" x2="23" y2="23"></line>
              </svg>
            </button>
          </div>
        </div>

        <div class="form-group">
          <label for="confirm-password">Confirm password</label>
          <input
            type="password"
            id="confirm-password"
            class="auth-input"
            placeholder="Repeat your password"
            autocomplete="new-password"
            required
          >
        </div>

        <p class="form-error" id="form-error" role="alert" hidden></p>

        <button type="submit" class="btn btn-primary btn-full" id="signup-btn">
          Create account
        </button>
      </form>

      <p class="auth-switch">
        Already have an account?
        <a href="login.html">Sign in</a>
      </p>
    </section>

    <footer class="app-footer">
      <p>Built with HTML, CSS & JavaScript</p>
    </footer>
  </main>

  <div class="toast-container" id="toast-container" aria-live="assertive" aria-atomic="true"></div>

  <script src="js/auth.js"></script>
  <script src="js/signup.js"></script>
</body>
</html>
