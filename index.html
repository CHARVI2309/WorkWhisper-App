<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="A beautiful, minimal todo list app built with HTML, CSS, and JavaScript">
  <title>TaskFlow — Todo App</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="background-shapes" aria-hidden="true">
    <div class="shape shape-1"></div>
    <div class="shape shape-2"></div>
    <div class="shape shape-3"></div>
  </div>

  <main class="app">
    <header class="app-header">
      <div class="user-bar" id="user-bar">
        <div class="user-info">
          <span class="user-avatar" id="user-avatar" aria-hidden="true">D</span>
          <div class="user-details">
            <span class="user-name" id="user-name">User</span>
            <span class="user-email" id="user-email">user@email.com</span>
          </div>
        </div>
        <button type="button" class="btn btn-ghost btn-logout" id="logout-btn">Logout</button>
      </div>
      <div class="logo">
        <span class="logo-icon" aria-hidden="true">✦</span>
        <h1>TaskFlow</h1>
      </div>
      <p class="tagline">Stay organized, one task at a time</p>
    </header>

    <section class="todo-card" aria-labelledby="todo-heading">
      <h2 id="todo-heading" class="visually-hidden">Your tasks</h2>

      <form class="todo-form" id="todo-form" autocomplete="off">
        <label for="todo-input" class="visually-hidden">New task</label>
        <div class="input-wrapper">
          <input
            type="text"
            id="todo-input"
            class="todo-input"
            placeholder="What needs to be done?"
            maxlength="120"
            aria-describedby="char-count"
          >
          <span id="char-count" class="char-count" aria-live="polite">0/120</span>
        </div>
        <button type="submit" class="btn btn-primary" id="add-btn" aria-label="Add task">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" aria-hidden="true">
            <line x1="12" y1="5" x2="12" y2="19"></line>
            <line x1="5" y1="12" x2="19" y2="12"></line>
          </svg>
          <span>Add</span>
        </button>
      </form>

      <div class="stats-bar" id="stats-bar" hidden>
        <div class="progress-ring-wrapper">
          <svg class="progress-ring" viewBox="0 0 36 36" aria-hidden="true">
            <circle class="progress-ring-bg" cx="18" cy="18" r="15.5"></circle>
            <circle class="progress-ring-fill" id="progress-ring" cx="18" cy="18" r="15.5"></circle>
          </svg>
          <span class="progress-text" id="progress-text">0%</span>
        </div>
        <div class="stats-details">
          <span id="task-count">0 tasks</span>
          <span class="stats-divider">·</span>
          <span id="completed-count">0 done</span>
        </div>
      </div>

      <nav class="filters" role="tablist" aria-label="Filter tasks">
        <button type="button" class="filter-btn active" data-filter="all" role="tab" aria-selected="true">All</button>
        <button type="button" class="filter-btn" data-filter="active" role="tab" aria-selected="false">Active</button>
        <button type="button" class="filter-btn" data-filter="completed" role="tab" aria-selected="false">Completed</button>
      </nav>

      <ul class="todo-list" id="todo-list" role="list" aria-live="polite"></ul>

      <div class="empty-state" id="empty-state">
        <div class="empty-icon" aria-hidden="true">📝</div>
        <h3>No tasks yet</h3>
        <p>Add your first task above to get started!</p>
      </div>

      <footer class="todo-footer" id="todo-footer" hidden>
        <span id="items-left"><strong>0</strong> items left</span>
        <button type="button" class="btn btn-ghost" id="clear-completed">Clear completed</button>
      </footer>
    </section>

    <footer class="app-footer">
      <p>Manage your tasks with less efforts!</p>
    </footer>
  </main>

  <div class="toast-container" id="toast-container" aria-live="assertive" aria-atomic="true"></div>

  <script src="js/auth.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
