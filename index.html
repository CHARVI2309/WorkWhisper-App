<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Work Whisper — your personal task management dashboard">
  <title>Work Whisper — Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="app-body">

  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-logo">
        <svg width="28" height="28" viewBox="0 0 32 32" fill="none" aria-hidden="true">
          <rect width="32" height="32" rx="8" fill="url(#sidebarLogoGrad)"/>
          <path d="M8 11h10M8 16h7M8 21h12" stroke="white" stroke-width="2" stroke-linecap="round"/>
          <circle cx="23" cy="21" r="4" fill="white" fill-opacity="0.2" stroke="white" stroke-width="1.5"/>
          <path d="M21.5 21l1 1 2-2" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          <defs>
            <linearGradient id="sidebarLogoGrad" x1="0" y1="0" x2="32" y2="32" gradientUnits="userSpaceOnUse">
              <stop stop-color="#7c3aed"/>
              <stop offset="1" stop-color="#4f46e5"/>
            </linearGradient>
          </defs>
        </svg>
        <span>Work Whisper</span>
      </div>
    </div>

    <nav class="sidebar-nav" aria-label="Task filters">
      <p class="sidebar-section-label">Views</p>
      <button type="button" class="sidebar-nav-item active" data-filter="all" aria-current="page">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
        All Tasks
        <span class="nav-badge" id="badge-all">0</span>
      </button>
      <button type="button" class="sidebar-nav-item" data-filter="active">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
        Active
        <span class="nav-badge" id="badge-active">0</span>
      </button>
      <button type="button" class="sidebar-nav-item" data-filter="completed">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><polyline points="20 6 9 17 4 12"/></svg>
        Completed
        <span class="nav-badge" id="badge-completed">0</span>
      </button>
    </nav>

    <div class="sidebar-progress" id="sidebar-progress" hidden>
      <p class="sidebar-section-label">Progress</p>
      <div class="progress-card">
        <div class="progress-bar-wrap">
          <div class="progress-bar-fill" id="progress-bar-fill"></div>
        </div>
        <div class="progress-labels">
          <span id="progress-label-done">0 done</span>
          <span id="progress-label-pct">0%</span>
        </div>
      </div>
    </div>

    <div class="sidebar-footer">
      <div class="sidebar-user" id="sidebar-user">
        <span class="sidebar-avatar" id="user-avatar" aria-hidden="true">?</span>
        <div class="sidebar-user-info">
          <span class="sidebar-user-name" id="user-name">Loading…</span>
          <span class="sidebar-user-email" id="user-email"></span>
        </div>
      </div>
      <button type="button" class="btn-logout" id="logout-btn" aria-label="Sign out">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
          <polyline points="16 17 21 12 16 7"/>
          <line x1="21" y1="12" x2="9" y2="12"/>
        </svg>
        Sign out
      </button>
    </div>
  </aside>

  <!-- Main content -->
  <div class="main-wrapper">
    <header class="topbar">
      <div class="topbar-left">
        <button type="button" class="sidebar-toggle" id="sidebar-toggle" aria-label="Toggle sidebar" aria-expanded="false">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
            <line x1="3" y1="6" x2="21" y2="6"/>
            <line x1="3" y1="12" x2="21" y2="12"/>
            <line x1="3" y1="18" x2="21" y2="18"/>
          </svg>
        </button>
        <div>
          <h1 class="topbar-title" id="topbar-title">All Tasks</h1>
          <p class="topbar-subtitle" id="topbar-subtitle">Manage and track your tasks</p>
        </div>
      </div>
      <div class="topbar-stats" id="topbar-stats">
        <div class="stat-chip">
          <span class="stat-chip-value" id="stat-total">0</span>
          <span class="stat-chip-label">Total</span>
        </div>
        <div class="stat-chip stat-chip--active">
          <span class="stat-chip-value" id="stat-active">0</span>
          <span class="stat-chip-label">Active</span>
        </div>
        <div class="stat-chip stat-chip--done">
          <span class="stat-chip-value" id="stat-done">0</span>
          <span class="stat-chip-label">Done</span>
        </div>
      </div>
    </header>

    <main class="content" id="main-content">
      <!-- Add task form -->
      <section class="add-task-section" aria-label="Add a new task">
        <form class="add-task-form" id="todo-form" autocomplete="off">
          <label for="todo-input" class="visually-hidden">New task</label>
          <div class="input-wrapper">
            <span class="input-icon" aria-hidden="true">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            </span>
            <input
              type="text"
              id="todo-input"
              class="todo-input"
              placeholder="Add a new task…"
              maxlength="120"
              aria-describedby="char-count"
            >
            <span id="char-count" class="char-count" aria-live="polite">0/120</span>
          </div>
          <button type="submit" class="btn btn-primary" id="add-btn" aria-label="Add task">
            Add Task
          </button>
        </form>
      </section>

      <!-- Task list -->
      <section class="task-list-section" aria-labelledby="task-list-heading">
        <h2 id="task-list-heading" class="visually-hidden">Your tasks</h2>

        <ul class="todo-list" id="todo-list" role="list" aria-live="polite"></ul>

        <div class="empty-state" id="empty-state">
          <div class="empty-icon" aria-hidden="true">
            <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" opacity="0.4"><path d="M9 5H7a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-2"/><rect x="9" y="3" width="6" height="4" rx="2"/><line x1="9" y1="12" x2="15" y2="12"/><line x1="9" y1="16" x2="13" y2="16"/></svg>
          </div>
          <h3>No tasks here</h3>
          <p>Add your first task above to get started.</p>
        </div>
      </section>

      <!-- Footer actions -->
      <footer class="task-footer" id="todo-footer" hidden>
        <span id="items-left"><strong>0</strong> items left</span>
        <button type="button" class="btn btn-ghost" id="clear-completed">Clear completed</button>
      </footer>
    </main>
  </div>

  <!-- Sidebar overlay for mobile -->
  <div class="sidebar-overlay" id="sidebar-overlay" aria-hidden="true"></div>

  <div class="toast-container" id="toast-container" aria-live="assertive" aria-atomic="true"></div>

  <script src="js/auth.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
